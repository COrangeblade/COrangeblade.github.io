<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>个人主页</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
        }
        header {
            display: flex;
            justify-content: space-between;
            background-color: #0073e6;
            color: white;
            padding: 10px 20px;
        }
        .button {
            background-color: #0073e6;
            border: none;
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }
        .button:hover {
            background-color: #005bb5;
        }
        .login-buttons img {
            border-radius: 50%;
            width: 40px;
            height: 40px;
        }
    </style>
</head>
<body>
    <header>
        <div>我的个人主页</div>
        <div class="login-buttons">
            <a href="/login">
                <button class="button">GitHub 登录</button>
            </a>
        </div>
    </header>

    <main style="text-align:center; padding: 50px;">
        <h1>欢迎来到我的个人主页！</h1>
        <p>这里是我的博客和友链等信息的入口。</p>
        <div>
            <a href="/blog.html"><button class="button">访问我的博客</button></a>
            <a href="/friends-links.html"><button class="button">友链</button></a>
            <a href="/projects.html"><button class="button">我的项目</button></a>
        </div>
    </main>

    <script>
        function getCookie(name) {
            const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            return match ? decodeURIComponent(match[2]) : null;
        }

        const username = getCookie('username');
        const avatar = getCookie('avatar');

        if (username && avatar) {
            const loginDiv = document.querySelector('.login-buttons');
            loginDiv.innerHTML = `
                <img src="${avatar}" alt="${username}" title="${username}" />
                <button class="button" onclick="logout()">登出</button>
            `;
        }

        function logout() {
            fetch('/logout')
                .then(() => location.reload());
        }
    </script>
</body>
</html>
